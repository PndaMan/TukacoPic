name: Build iOS

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build iOS Simulator (.zip)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install
          cd ..

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ios/xcodebuild.log | tail -50
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::group::Full build log (last 200 lines)"
            tail -200 ios/xcodebuild.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Package Simulator Build
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 5
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/TukacoPic-simulator.zip" "$(basename "$APP_PATH")"

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-simulator
          path: TukacoPic-simulator.zip
          retention-days: 30

  build-ipa:
    name: Build IPA (Sideload)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install
          cd ..

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build unsigned IPA
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee ios/xcodebuild.log | tail -50
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::group::Full build log (last 200 lines)"
            tail -200 ios/xcodebuild.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Ad-hoc sign and package IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 5
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # Extract bundle identifier from Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"

          # Create minimal entitlements for sideloading
          cat > /tmp/entitlements.plist << 'ENTXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.team-identifier</key>
            <string>SIDELOAD00</string>
            <key>get-task-allow</key>
            <true/>
          </dict>
          </plist>
          ENTXML

          # Sign each embedded framework individually first (--deep is unreliable)
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "*.framework" -o -name "*.dylib" | while read fw; do
              echo "Signing framework: $fw"
              codesign --force --sign - "$fw"
            done
          fi

          # Sign any app extensions
          find "$APP_PATH" -name "*.appex" -type d | while read ext; do
            echo "Signing extension: $ext"
            codesign --force --sign - "$ext"
          done

          # Sign the main app with entitlements
          codesign --force --sign - --entitlements /tmp/entitlements.plist "$APP_PATH"
          echo "Ad-hoc signed successfully"

          # Verify signature
          codesign --verify --verbose "$APP_PATH" || echo "Warning: verification note (ad-hoc is expected)"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "$GITHUB_WORKSPACE/TukacoPic.ipa" Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-ipa
          path: TukacoPic.ipa
          retention-days: 30

