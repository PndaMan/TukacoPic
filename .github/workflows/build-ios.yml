name: Build iOS

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build iOS Simulator (.zip)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install
          cd ..

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ios/xcodebuild.log | tail -50
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::group::Full build log (last 200 lines)"
            tail -200 ios/xcodebuild.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Package Simulator Build
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 5
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/TukacoPic-simulator.zip" "$(basename "$APP_PATH")"

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-simulator
          path: TukacoPic-simulator.zip
          retention-days: 30

  build-ipa:
    name: Build IPA (Sideload)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install
          cd ..

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found workspace: $WORKSPACE, scheme: $SCHEME"

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build unsigned IPA
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee ios/xcodebuild.log | tail -50
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::group::Full build log (last 200 lines)"
            tail -200 ios/xcodebuild.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Prepare and package IPA
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in ios/build"
            find ios/build -type d -maxdepth 5
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # Convert ALL plist files to XML format so Sideloader's libplist can parse them
          find "$APP_PATH" -name "*.plist" | while read plist; do
            echo "Converting to XML: $plist"
            plutil -convert xml1 "$plist" 2>/dev/null || true
          done

          # Resolve any symlinks (ditto copies and flattens symlinks properly)
          CLEAN_APP="/tmp/CleanApp/$(basename "$APP_PATH")"
          mkdir -p /tmp/CleanApp
          ditto "$APP_PATH" "$CLEAN_APP"

          # Remove code signatures — sideloading tools re-sign from scratch
          find "$CLEAN_APP" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$CLEAN_APP" -name "CodeResources" -delete 2>/dev/null || true
          find "$CLEAN_APP" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          # Remove macOS resource fork metadata
          find "$CLEAN_APP" -name "._*" -delete 2>/dev/null || true
          find "$CLEAN_APP" -name ".DS_Store" -delete 2>/dev/null || true

          # Build IPA with correct Payload/ structure
          mkdir -p /tmp/IPA/Payload
          cp -r "$CLEAN_APP" /tmp/IPA/Payload/
          cd /tmp/IPA
          # -X excludes extended attributes, -y stores symlinks as-is
          zip -r -X "$GITHUB_WORKSPACE/TukacoPic.ipa" Payload

          # Verify IPA structure
          echo "=== IPA contents ==="
          unzip -l "$GITHUB_WORKSPACE/TukacoPic.ipa" | head -30
          echo "=== Info.plist check ==="
          cat "/tmp/IPA/Payload/$(basename "$APP_PATH")/Info.plist" | head -5

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-ipa
          path: TukacoPic.ipa
          retention-days: 30

  release-ipa:
    name: Create Release
    needs: build-ipa
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: TukacoPic-ipa

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            Automated build from commit ${{ github.sha }}

            **Commit:** `${{ steps.sha.outputs.short }}`
            **Message:** ${{ github.event.head_commit.message }}
          files: TukacoPic.ipa
          make_latest: true

      - name: Trigger source update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SOURCE_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/PndaMan/sidestore-source/dispatches \
            -d '{"event_type":"ipa-updated"}'
        continue-on-error: true

