name: Build iOS

on:
  push:
    branches: [master, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build iOS Simulator (.zip)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build for Simulator
        run: |
          xcodebuild \
            -workspace ios/TukacoPic.xcworkspace \
            -scheme TukacoPic \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Package Simulator Build
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/TukacoPic-simulator.zip" "$(basename "$APP_PATH")"

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-simulator
          path: TukacoPic-simulator.zip
          retention-days: 30

  build-ipa:
    name: Build IPA (Sideload)
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -workspace ios/TukacoPic.xcworkspace \
            -scheme TukacoPic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "$GITHUB_WORKSPACE/TukacoPic.ipa" Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TukacoPic-ipa
          path: TukacoPic.ipa
          retention-days: 30

